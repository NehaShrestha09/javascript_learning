<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML events</title>
</head>
<body>
    <h1>Neha Shrestha</h1>
    <button id="stop">Stop</button>
</body>
<script>
    const sayMyName = () => {
        console.log("Neha");   
    }
    const changeText = () => {
        document.querySelector('h1').innerHTML = "Nitisha"
    }
    const change = setTimeout(changeText, 2000);

    document.querySelector('#stop').
    addEventListener('click',() => {
        clearTimeout(change)
        console.log("Stopped");
        
    })
</script>
</html>
